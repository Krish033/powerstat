name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build .deb + Create GitHub Release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            dpkg-dev \
            desktop-file-utils \
            librsvg2-bin \
            python3-psutil

      - name: Install test tools
        run: pip install psutil

      - name: Run tests (release gate)
        run: python3 -m unittest tests/test_analytics.py -v

      - name: Generate PNG icons from SVG
        run: bash scripts/generate-icons.sh

      - name: Extract version from tag
        id: version
        run: |
          # Use the git tag (strips leading 'v')
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        run: bash scripts/build.sh --version="${{ steps.version.outputs.version }}"

      - name: Validate .deb package
        run: bash scripts/package.sh

      - name: Confirm .deb artifact exists
        run: |
          DEB="build/powerstats_${{ steps.version.outputs.version }}_all.deb"
          if [ ! -f "$DEB" ]; then
            echo "ERROR: .deb not found at $DEB" >&2
            ls -la build/ >&2
            exit 1
          fi
          echo "Artifact ready: $DEB ($(du -sh "$DEB" | cut -f1))"

      - name: Extract changelog for this release
        run: |
          python3 - <<'EOF'
          import re
          with open("CHANGELOG.md") as f:
              content = f.read()
          match = re.search(r'## \[\d+\.\d+\.\d+\].*?\n(.*?)(?=\n## \[|\Z)', content, re.DOTALL)
          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)
          EOF

      - name: Create source tarball
        run: |
          tar -czf "powerstats-${{ steps.version.outputs.version }}.tar.gz" \
            --exclude='./__pycache__' \
            --exclude='./.git' \
            --exclude='./build' \
            --exclude='./*.db' \
            --exclude='./assets/icons/*.png' \
            ./

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PowerStats v${{ steps.version.outputs.version }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            build/powerstats_${{ steps.version.outputs.version }}_all.deb
            powerstats-${{ steps.version.outputs.version }}.tar.gz

name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build .deb + Create GitHub Release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            dpkg-dev \
            desktop-file-utils \
            python3-psutil

      - name: Install test tools
        run: pip install psutil

      - name: Run tests (release gate)
        working-directory: powerstats-1.0.0
        run: python3 -m unittest tests/test_analytics.py -v

      - name: Extract version from tag
        id: version
        run: |
          # Use the git tag (strips leading 'v')
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        working-directory: powerstats-1.0.0
        run: bash scripts/build.sh --version="${{ steps.version.outputs.version }}"

      - name: Validate .deb package
        working-directory: powerstats-1.0.0
        run: bash scripts/package.sh

      - name: Extract changelog for this release
        run: |
          python3 - <<'EOF'
          import re
          with open("powerstats-1.0.0/CHANGELOG.md") as f:
              content = f.read()
          match = re.search(r'## \[\d+\.\d+\.\d+\].*?\n(.*?)(?=\n## \[|\Z)', content, re.DOTALL)
          notes = match.group(1).strip() if match else "See CHANGELOG.md for details."
          with open("/tmp/release_notes.md", "w") as f:
              f.write(notes)
          EOF

      - name: Create source tarball
        run: |
          tar -czf "powerstats-${{ steps.version.outputs.version }}.tar.gz" \
            --exclude='*/__pycache__' \
            --exclude='*/.git' \
            --exclude='*/build' \
            --exclude='*/*.db' \
            powerstats-1.0.0/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PowerStats v${{ steps.version.outputs.version }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          files: |
            powerstats-1.0.0/build/powerstats_${{ steps.version.outputs.version }}_all.deb
            powerstats-${{ steps.version.outputs.version }}.tar.gz

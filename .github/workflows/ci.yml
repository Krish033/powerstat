name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install flake8 isort

      - name: flake8 (pure-Python modules only)
        # Exclude GTK-dependent UI files that require system gi libraries
        run: |
          flake8 analytics_data.py daemon.py version.py \
            --max-line-length=120 \
            --extend-ignore=E501,W503

      - name: isort (pure-Python modules only)
        run: |
          isort --check-only \
            --known-third-party=psutil,gi \
            --force-sort-within-sections \
            analytics_data.py daemon.py version.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-psutil

      - name: Install test dependencies
        run: pip install psutil

      - name: Run tests
        # Uses unittest directly — analytics_data.py is pure Python, no gi needed
        run: python3 -m unittest tests/test_analytics.py -v

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint tools
        run: pip install flake8 isort black

      - name: flake8
        run: flake8 powerstats-1.0.0/*.py --max-line-length=120 --extend-ignore=E501,W503

      - name: isort
        run: isort --check-only powerstats-1.0.0/*.py

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y python3-psutil

      - name: Install test dependencies
        run: pip install pytest pytest-cov psutil

      - name: Run tests
        working-directory: powerstats-1.0.0
        run: python3 -m pytest tests/ -v --tb=short --cov=. --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          file: powerstats-1.0.0/coverage.xml
          fail_ci_if_error: false
